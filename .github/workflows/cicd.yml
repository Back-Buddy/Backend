name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install dependencies
        run: dotnet restore src/Backend.sln

      - name: Build Api
        run: dotnet build src/Api/Api.csproj -c Release

      - name: Exceute Unit Tests
        run: dotnet test src/Api-Test/Api-Test.csproj -v n

  build_docker_artifacts:
    name: Build Docker Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_URL }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker Images
        working-directory: "${{ github.workspace }}/src/"
        env:
          DOCKER_BUILDKIT: 1
        run: |
          docker-compose -f docker-compose.yml build \
            --build-arg ${DOCKER_FILE_ARGS:-""}

      - name: Tag Docker Images
        run: |
          IMAGE=${{ vars.ACR_URL }}/backbuddy_api
          VERSION=${{ vars.MAJOR_VERSION }}.${{ vars.MINOR_VERSION }}.${{ github.run_number }}
          
          docker tag $IMAGE $IMAGE:latest
          docker tag $IMAGE $IMAGE:$VERSION

      - name: Save Docker Images
        run: |
          docker save -o backbuddy_api.tar ${{ vars.ACR_URL }}/backbuddy_api

      - name: Upload Api Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: backbuddy_api
          path: backbuddy_api.tar

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Services
        uses: hoverkraft-tech/compose-action@v2.0.2
        with:
          cwd: "${{ github.workspace }}/src/"
          compose-file: "docker-compose.override.yml"

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install dependencies
        run: dotnet restore src/Backend.sln

      - name: Exceute Integration Tests
        run: dotnet test src/Integration-Test/Integration-Test.csproj -v n
