name: CI/CD

on:
  push:
    branches: ["main", "cidcd_pipeline"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install dependencies
        run: dotnet restore src/Backend.sln

      - name: Build Api
        run: dotnet build src/Api/Api.csproj -c Release

      - name: Exceute Unit Tests
        run: dotnet test src/Api-Test/Api-Test.csproj -v n

  build_docker_artifacts:
    name: Build Docker Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_URL }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker Images
        working-directory: "${{ github.workspace }}/src/"
        env:
          DOCKER_BUILDKIT: 1
          DOCKER_REGISTRY: ${{ vars.ACR_URL }}/
        run: |
          docker compose -f docker-compose.yml build \
            --build-arg ${DOCKER_FILE_ARGS:-""}

      - name: Tag Docker Images
        run: |
          IMAGE=${{ vars.ACR_URL }}/backbuddy/api
          VERSION=${{ vars.MAJOR_VERSION }}.${{ vars.MINOR_VERSION }}.${{ github.run_number }}

          docker tag $IMAGE:latest $IMAGE:$VERSION

      - name: Save Docker Images
        run: |
          IMAGE=${{ vars.ACR_URL }}/backbuddy/api
          docker save -o backbuddy_api.tar $IMAGE

      - name: Upload Api Docker Image
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backbuddy_api
          path: backbuddy_api.tar
          retention-days: 1

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' # TODO: Remove this after testing
    needs: [build, build_docker_artifacts]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Services
        uses: hoverkraft-tech/compose-action@v2.0.2
        with:
          cwd: "${{ github.workspace }}/src/"
          compose-file: "docker-compose.override.yml"

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install dependencies
        run: dotnet restore src/Backend.sln

      - name: Exceute Integration Tests
        run: dotnet test src/Integration-Test/Integration-Test.csproj -v n

  deploy_docker_artifacts:
    name: Deploy Docker Artifacts
    runs-on: ubuntu-latest
    needs: [build, build_docker_artifacts] #TODO: Add Integration Testx
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_URL }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Download Api Docker Image
        uses: actions/download-artifact@v4
        with:
          name: backbuddy_api

      - name: Load Docker Image
        run: |
          docker load -i backbuddy_api.tar

      - name: Push latest Docker Images
        working-directory: "${{ github.workspace }}/src/"
        env:
          DOCKER_BUILDKIT: 1
          DOCKER_REGISTRY: ${{ vars.ACR_URL }}/
        run: |
          docker compose -f docker-compose.yml push

      - name: Push Docker Images with Version
        working-directory: "${{ github.workspace }}/src/"
        env:
          DOCKER_BUILDKIT: 1
          DOCKER_REGISTRY: ${{ vars.ACR_URL }}/
          TAG: ${{ vars.MAJOR_VERSION }}.${{ vars.MINOR_VERSION }}.${{ github.run_number }}
        run: |
          docker compose -f docker-compose.yml push

  deploy_2container_app:
    name: Deploy to Container App
    runs-on: ubuntu-latest
    needs: [deploy_docker_artifacts]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Api image to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ vars.ACR_URL }}/backbuddy/api:latest
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppName: ${{ vars.CONTAINER_APP_NAME }}
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Production
            ASPNETCORE_HTTP_PORTS=8080
            Auth__Authority=${{ vars.AUTHORITY }}
            Auth__ValidIssuer=${{ vars.VALID_ISSUER }}
            Auth__ValidAudience=${{ vars.VALID_AUDIENCE }}
            MongoDB__Connection=secretref:${{ secrets.MONGODB_CONNECTION }}
            MongoDB__DatabaseName=${{ vars.MONGODB_DATABASE_NAME }}
            Redis__Connection=secretref:${{ secrets.REDIS_CONNECTION }}
            Redis__DatabaseName=${{ vars.REDIS_DATABASE_NAME }}
            KEY_VAULT_URI=${{ vars.KEY_VAULT_URI }}
            AZURE_CLIENT_ID=secretref:${{ secrets.KEY_VAULT_AZURE_CLIENT_ID }}
            AZURE_CLIENT_SECRET=secretref:${{ secrets.KEY_VAULT_AZURE_CLIENT_SECRET }}
            AZURE_TENANT_ID=secretref:${{ secrets.KEY_VAULT_AZURE_TENANT_ID }}